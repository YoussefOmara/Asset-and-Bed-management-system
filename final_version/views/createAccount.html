<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="/general.css" />
    <title>Add User</title>
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="/Health_Flow.png"/ width="100" height="100"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarsExample03">
        <ul class="navbar-nav me-auto mb-2 mb-sm-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/admin">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/createAccount">Add User</a>
          </li>
        </ul>
      </div>
    </div>
    <button class="logout" style="width: 140px;" onclick="location.href='/changePass';">Change Pass</button>
    <button class="logout" onclick="location.href='/logout';">Log out</button>
  </nav>

  <div class="container mt-4">
    <h2>Add User</h2>
    <form id="assetForm" method="POST" action='/createAccount'>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <div class="mb-3">
        <label for="role" class="form-label">Department</label>
        <select class="form-select" id="role" name="role" required>
          <option value="" disabled selected hidden>Select a role</option>
          <option value="admin">Admin</option>
          <option value="engineer">Engineer</option>
          <option value="doctor">Doctor</option>
          <option value="nurse">Nurse</option>
        </select>
      <br><button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>

  <script
    src="js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
</body>
</html>
