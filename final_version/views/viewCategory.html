<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
    href="/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
    <!-- <link rel="stylesheet" href="front_page_u.css" /> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
    <link rel="stylesheet" href="/viewCategory.css">
    <link rel="stylesheet" href="/general.css" />
    <!-- <script
      src="https://code.jquery.com/jquery-3.6.3.min.js"
      integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU="
      crossorigin="anonymous"></script> -->
    <!-- <script type="text/javascript" src="data_chart.js"></script> -->
    <title>{{category}}</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="/Health_Flow.png"/ width="100" height="100"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
  
        <div class="collapse navbar-collapse" id="navbarsExample03">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0">
            {{nav}}
          </ul>
        </div>
      </div>
      <button class="logout" style="width: 140px;" onclick="location.href='/changePass';">Change Pass</button>
      <button class="logout" onclick="location.href='/logout';">Log out</button>
    </nav>

  <div class="container">
    <div class="filter">
      <select id="filter" class="form-select" aria-label="filter" onchange="filter(this.value);" style="width: fit-content;">
        <option value="all">All departments</option>
        {{departments}}
      </select>
    </div>

    <div id="cardContainer"></div>
  </div>

    <script>
      function filter(val){
        var all = false;
        if(val == "all"){all = true;}

        values = `{values}`;
        var rows = document.getElementById('cardContainer');
        rows.innerHTML = "";

        for(let i = 0; i < values.length; i++){
          if(all || val == values[i][1]){
            rows.innerHTML += `<div class="card" style="width: 18rem;">
              <div class="card-body">
                  <center><h5 class="card-title">${values[i][0]}</h5></center>
                  <p class="card-text">Department: ${values[i][1]}</p>
                  <p class="card-text">Location: ${values[i][2]}</p>
                  <p class="card-text">Model: ${values[i][3]}</p>
                  <p class="card-text">Manufacturer: ${values[i][4]}</p>
                  <p class="card-text">Serial: ${values[i][5]}</p>
                  <p class="card-text">Status: ${values[i][6]}</p>
                  <p class="card-text">Warranty End Date: ${values[i][7]}</p>
                  <p class="card-text">Service Contract End Date: ${values[i][8]}</p>
                  <center><input type="button" class="btn btn-primary" value="Full Details" onclick="location.href='/viewAssets/{{category}}/${values[i][5]}';"/></center>
              </div>
            </div>`;
          }
        }
      }

      filter('all')
    </script>
    <script
    src="/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  </body>
</html>
