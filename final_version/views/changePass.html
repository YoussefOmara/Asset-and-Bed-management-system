<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="/general.css" />
    <title>Change Pass</title>
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="/Health_Flow.png"/ width="100" height="100"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarsExample03">
        <ul class="navbar-nav me-auto mb-2 mb-sm-0">
            {{nav}}
        </ul>
      </div>
    </div>
    <button class="logout" style="width: 140px;" onclick="location.href='/changePass';">Change Pass</button>
    <button class="logout" onclick="location.href='/logout';">Log out</button>
  </nav>

  <div class="container mt-4">
    <h2>Change Password</h2>
    <form id="assetForm" method="POST" action='/changePass'>
        <div class="mb-3">
            <label for="oldPass" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="oldPass" name="oldPass" required>
        </div>
        <div class="mb-3">
            <label for="newPass" class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPass" name="newPass" required>
        </div>
      <br><button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>

  <script
    src="/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
</body>
</html>
