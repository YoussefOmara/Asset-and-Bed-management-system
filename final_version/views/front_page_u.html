<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="general.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
    <title>Dashboard</title>
  </head>
  <body>

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="/Health_Flow.png"/ width="100" height="100"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
  
        <div class="collapse navbar-collapse" id="navbarsExample03">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/admin">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/createAccount">Add User</a>
            </li>
          </ul>
        </div>
      </div>
      <button class="logout" style="width: 140px;" onclick="location.href='/changePass';">Change Pass</button>
      <button class="logout" onclick="location.href='/logout';">Log out</button>
    </nav>
  

    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="card-title">Users per Role</h5>
            </div>
            <div class="card-body">
              <canvas id="chart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="card-title">Users</h5>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label for="role-filter" class="form-label">Filter by Role:</label>
                <select id="role-filter" class="form-select" onchange="filter(this.value);">
                  <option value="all">All Roles</option>
                  <option value="admin">Admin</option>
                  <option value="engineer">Engineer</option>
                  <option value="doctor">Doctor</option>
                  <option value="nurse">Nurse</option>
                </select>
              </div>
              <table id="user-table" class="table table-striped table-hover">
                <thead>
                  <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      var roleCount = `{roleCount}`

      const chartCanvas = document.getElementById('chart').getContext('2d');
      new Chart(chartCanvas, {
        type: 'pie',
        data: {
          labels: roleCount[0],
          datasets: [{
            label: 'Data',
            data: roleCount[1],
            backgroundColor: ['#6c63ff', '#ff5c5c', '#ffd700', '#00c9a7'],
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: {
                  size: 14,
                  weight: 'bold'
                }
              }
            }
          }
        }
      });
    </script>
    <script>
      function filter(val){
        var all = false;
        if(val == "all"){all = true;}

        var userList = `{userList}`;

        var rows = document.getElementById('rows');
        rows.innerHTML = "";

        for(let i = 0; i < userList.length; i++){
          if(all || val == userList[i][1]){
            let color = '#00ff00';
            if(userList[i][2] == 'inactive'){color = '#ff0000';}

            rows.innerHTML += `<tr><td>${userList[i][0]}</td><td>${userList[i][1]}</td><td><span style="color: ${color};" class="highlight">${userList[i][2]}</span><a href="/admin/manageUser/${userList[i][0]}" class="btn btn-custom btn-sm">manage</a></td>`;
          }
        }
      }

      filter('all')
    </script>
    <script src="js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
