<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="/nurse.css" />
  <link rel="stylesheet" href="/general.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
  <title>Dashboard</title>
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="/Health_Flow.png"/ width="100" height="100"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarsExample03">
        <ul class="navbar-nav me-auto mb-2 mb-sm-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/doctor">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/Submit_report">Report Issue</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/viewreport">View Reports</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/viewAssets">View Assets</a>
          </li>
        </ul>
      </div>
    </div>
    <button class="logout" style="width: 140px;" onclick="location.href='/changePass';">Change Pass</button>
    <button class="logout" onclick="location.href='/logout';">Log out</button>
  </nav>

  <br><br>
  <canvas id="myChart"></canvas>

  <br><br>
  <select id="filter" class="form-select" aria-label="filter" onchange="filter(this.value);" style="width: fit-content;">
    <option value="All departments">All departments</option>
    {{departments}}
  </select>

  <div class="container-fluid">
    {{cards}}
  </div>
  

  <script src="/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  <script>
    var categories = `{categories}`;
    var values = `{values}`;
    var devicesDict = `{devicesDict}`;
    var bedDevicesDict = `{bedDevicesDict}`;
    var pics = `{pics}`;

    function filter(val){
      var all = false;
      if(val == "All departments"){all = true;}

      for(let catID = 0; catID < categories.length; catID++){
        var cards = document.getElementById(`${categories[catID]}`);
        cards.innerHTML = "";
        let cat = categories[catID];

        let pic;
        if(cat in pics){pic = pics[cat];}
        else{pic = pics['placeholder'];}

        for(let i = 0; i < values[categories[catID]].length; i++){
          if(all || val == values[cat][i][0]){
            let color = 'rgb(255, 140, 0)';
            
            if(values[cat][i][5] == 'Available'){
              color = 'RGB(0, 100, 0)';
              if(cat == 'Bed'){pic = pics['bedAvailable'];}
            }
            else if(values[cat][i][5] == 'Not Functional'){
              color = 'RGB(139, 0, 0)';
              if(cat == 'Bed'){pic = pics['bedNotFunctional'];}
            }
            else if(cat == 'Bed'){pic = pics['bedOccupied']}

            let tmp = `<div class="card" style="background-color: ${color};">
            <div class="card-body">
              <div class="row">
                <div class="col-3 d-flex align-items-center justify-content-center">
                  <img src="/pics/${pic}" alt="cat icon" style="height: 80px;">
                </div>
                <div class="col-9 d-flex flex-column justify-content-between">
                  <div class="d-flex justify-content-end">
                    <h5 class="card-title">${values[cat][i][2]}</h5>
                  </div>
                  <div class="row justify-content-end">
                    <div class="col">
                      <p class="card-text text-end">
                        <span class="badge bg-info">Model: ${values[cat][i][3]}</span>
                        <span class="badge bg-info">Serial: ${values[cat][i][4]}</span>
                        <span class="badge bg-info">Location: ${values[cat][i][1]}</span>
                        <span class="badge bg-info">Department: ${values[cat][i][0]}</span>
                        <span class="badge bg-success">Status: ${values[cat][i][5]}</span>
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>`

            if(cat == 'Bed' && values[cat][i][4] in bedDevicesDict){
              tmp += `<hr>
              <h6 class="card-subtitle mb-2 text-muted">Attached Devices:</h6>
              <div class="row">`;

              for(let j = 0; j < bedDevicesDict[values[cat][i][4]].length; j++){
                tmp += `<div class="col">
                  <div class="d-flex align-items-center">
                    <img src="/pics/${devicesDict[bedDevicesDict[values[cat][i][4]][j]]}" alt="cat icon" style="height: 30px;">
                    <span class="ms-2">${bedDevicesDict[values[cat][i][4]][j]}</span>
                  </div>
                </div>`
              }
              tmp += '</div>';
            }

            cards.innerHTML += tmp + '</div>';
          }
        }
      }
    }

    filter("All departments")
  </script>

<script>
  function togglePanel(panelId) {
    const panel = document.getElementById(panelId);
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }
</script>

<script>
  const departmentData = `{departmentData}`;
  var departmentList = [], availableList = [], occupiedList = [], notFunctionalList = [];

  for (const dep in departmentData){
    departmentList.push(dep);
    availableList.push(departmentData[dep]["Available"]);
    occupiedList.push(departmentData[dep]["Occupied"]);
    notFunctionalList.push(departmentData[dep]["Not Functional"]);
  }

  const ctx = document.getElementById('myChart').getContext('2d');
  
  // Sample data
  const data = {
    labels: departmentList,
    datasets: [
      {
        label: 'Available',
        data: availableList,
        backgroundColor: '#60a86f',
      },
      {
        label: 'Occupied',
        data: occupiedList,
        backgroundColor: '#ffcc29',
      },
      {
        label: 'Not Functional',
        data: notFunctionalList,
        backgroundColor: '#f54949',
      },
    ]
  };
  
  const options = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'bottom',
      },
    },
    scales: {
      x: {
        stacked: true,
      },
      y: {
        stacked: true,
        beginAtZero: true,
      },
    },
  };
  
  const myChart = new Chart(ctx, {
    type: 'bar',
    data: data,
    options: options
  });
</script>
</body>
</html>
