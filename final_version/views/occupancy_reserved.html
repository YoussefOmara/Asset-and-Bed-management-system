    <section>
        <h1>Reserved Devices</h1>
  <div style="width: 50%">
    <canvas id="devices-chart"></canvas>
  </div>
  <table>
    <thead>
      <tr>
        <th>Device Name</th>

    </tbody>
  </table>

    <div class="container_bedschart" style="display: flex;width: 50%; height: 50%;">
      <canvas id="bedsChart"></canvas>
    </div>
    <div class="container_bedschart" style="display: flex;width: 50%; height: 50%;">

    <!-- <div class="container_bedschart" style="display: flex;width: 50%; height: 50%;">

    <script>
      var ctx = document.getElementById('uptimeChart').getContext('2d');
      var uptimeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
          datasets: [{
            label: 'Uptime',
            data: [10, 12, 11, 13, 14, 15, 16],
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            borderColor: 'rgba(54, 162, 235, 1)',
            borderWidth: 1
          }, {
            label: 'Downtime',
            data: [2, 0, 1, 0, 0, 0, 1],
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            borderColor: 'rgba(255, 99, 132, 1)',
            borderWidth: 1
          }]
        },
        options: {
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    </script>
<script>
  var ctx = document.getElementById('bedsChart').getContext('2d');
  var bedsChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
      datasets: [{
        label: 'Total occupied beds per month',
        data: [150, 120, 170, 200, 190, 145, 210],
        backgroundColor: 'rgba(255, 99, 132, 0.2)',
        borderColor: 'rgba(255, 99, 132, 1)',
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>
