<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="general.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
    <!-- <script
      src="https://code.jquery.com/jquery-3.6.3.min.js"
      integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU="
      crossorigin="anonymous"></script> -->
    <!-- <script type="text/javascript" src="data_chart.js"></script> -->
    <title>Submit Report</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="/Health_Flow.png"/ width="100" height="100"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
  
        <div class="collapse navbar-collapse" id="navbarsExample03">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0">
            {{nav}}
          </ul>
        </div>
      </div>
      <button class="logout" style="width: 140px;" onclick="location.href='/changePass';">Change Pass</button>
      <button class="logout" onclick="location.href='/logout';">Log out</button>
    </nav>

    <div class="container mt-4">
      <h2>Submit Report</h2>
      <form id="assetForm" method="POST" action='/Submit_report'>
        <div class="mb-3">
          <label for="category" class="form-label">Category</label>
          <select class="form-select" id="category" name="category" onchange='filter(this.value);' required>
            <option value="" disabled selected hidden>Select a category</option>
            {{categories}}
          </select>
        </div>
        <div class="mb-3">
          <label for="serial" class="form-label">Serial</label>
          <select class="form-select" id="serial" name="serial" required>
            <option value="" disabled selected hidden>Select a serial</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="descirption" class="form-label">Problem Description</label>
          <textarea class="form-control" id="description" name="description" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>


    <script>
      var serials = `{values}`;

      function filter(val){
        var options = document.getElementById("serial");
        options.innerHTML = `<option value="" disabled selected hidden>Select a serial</option>`;

        for(let i = 0; i < serials[val].length; i++){options.innerHTML += `<option value="${serials[val][i]}">${serials[val][i]}</option>`;}
      }
    </script>
    <script
      src="js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
