    <script>
      // Get the CSV file.
       // Method to load a CSV file and display it in the table
       function loadCSV() {
        fetch('nurse.csv')
          .then(response => response.text())
          .then(csvData => {
            //Here calling another method to read CSV file into json
            csvFileToJSON(csvData);
          })
          .catch(error => {
            console.error(error);
          });
      }
       
      //Method to read csv data and convert it into JSON 
      function csvFileToJSON(csvData){
          try {
            var jsonData = [];
            var headers = [];
            var rows = csvData.split("\r\n");               
            for (var i = 0; i < rows.length; i++) {
                var cells = rows[i].split(",");
                var rowData = {};
                for(var j=0;j<cells.length;j++){
                    if(i==0){
                        var headerName = cells[j].trim();
                        headers.push(headerName);
                    }else{
                        var key = headers[j];
                        if(key){
                            rowData[key] = cells[j].trim();
                        }
                    }
                }
                 
                if(i!=0){
                    jsonData.push(rowData);
                }
            }
              
            //displaying the json result into table
            displayJsonToTable(jsonData);
          } catch(e){
            console.error(e);
          }
      }
       
      //Method to display the data in Table
      function displayJsonToTable(jsonData){
        var table=document.getElementById("display_csv_data");
        if(jsonData.length>0){
            var headers = Object.keys(jsonData[0]);
            var htmlHeader='<thead><tr>';
             
            for(var i=0;i<headers.length;i++){
                htmlHeader+= '<th>'+headers[i]+'</th>';
            }
            htmlHeader+= '<tr></thead>';
             
            var htmlBody = '<tbody>';
            for(var i=0;i<jsonData.length;i++){
                var row=jsonData[i];
                htmlBody+='<tr>';
                for(var j=0;j<headers.length;j++){
                    var key = headers[j];
                    htmlBody+='<td>'+row[key]+'</td>';
                }
                htmlBody+='</tr>';
            }
            htmlBody+='</tbody>';
            table.innerHTML=htmlHeader+htmlBody;
        }else{
            table.innerHTML='There is no data in CSV';
        }
      }
      
      // Example usage: Call the loadCSV() function to load the data.csv file
      loadCSV();
       
      </script>
